<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AI Workflow Assistant</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-input: #0b1220;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            --radius: 14px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        body {
            overflow: hidden;
        }

        button, input, select, textarea {
            font: inherit;
        }

        .hidden {
            display: none !important;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-primary);
        }

        /* 顶部 */
        .topbar {
            flex-shrink: 0;
            padding: 12px 14px 10px;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .topbar-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .topbar-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .topbar-nav::-webkit-scrollbar {
            display: none;
        }

        .nav-item {
            flex: 0 0 auto;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 9px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.15s ease;
            white-space: nowrap;
        }

        .nav-item.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* 页面 */
        .page-wrap {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .page {
            display: none;
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 14px;
            padding-bottom: calc(24px + var(--safe-bottom));
        }

        .page.active {
            display: block;
        }

        /* 卡片 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
        }

        .card-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 15px;
            font-weight: 700;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            min-height: 42px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        textarea.form-input {
            min-height: 96px;
            resize: vertical;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        /* 按钮 */
        .btn {
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text-primary);
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-danger {
            background: var(--error);
            color: #fff;
        }

        .btn-sm {
            padding: 7px 10px;
            font-size: 12px;
            border-radius: 10px;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-row .btn {
            flex: 1 1 auto;
        }

        /* 空态 */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 26px 10px;
        }

        .empty-state .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        /* 聊天 */
        .chat-layout {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .conversation-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            min-height: 50vh;
        }

        .chat-messages {
            flex: 1;
            min-height: 280px;
            max-height: 50vh;
            overflow-y: auto;
            padding: 6px 0;
        }

        .chat-message {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .chat-message.user {
            flex-direction: row-reverse;
        }

        .chat-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .chat-message.assistant .chat-avatar {
            background: var(--primary);
        }

        .chat-message.user .chat-avatar {
            background: var(--success);
        }

        .chat-bubble {
            max-width: calc(100% - 46px);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 11px 12px;
            font-size: 14px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .chat-message.user .chat-bubble {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .chat-input-area {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 批处理 */
        .batch-upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 24px 14px;
            text-align: center;
            cursor: pointer;
            transition: 0.15s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .batch-upload-area:hover,
        .batch-upload-area.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
        }

        .batch-file-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 12px;
        }

        .batch-file-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .batch-file-name {
            font-size: 14px;
            font-weight: 700;
        }

        .batch-file-meta {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .batch-file-config {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }

        .batch-file-config label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* 列表项 */
        .task-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 10px;
            background: var(--bg-card);
        }

        /* 模态框 */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.78);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
        }

        .modal-content {
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 16px 14px calc(18px + var(--safe-bottom));
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-body {
            max-height: calc(92vh - 90px);
            overflow-y: auto;
        }

        /* 加载 */
        .global-loading {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(2, 6, 23, 0.72);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .global-loading-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            text-align: center;
            min-width: 180px;
            box-shadow: var(--shadow);
        }

        /* toast */
        .toast-container {
            position: fixed;
            left: 12px;
            right: 12px;
            bottom: calc(12px + var(--safe-bottom));
            z-index: 210;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            box-shadow: var(--shadow);
        }

        .toast-info { background: #475569; }
        .toast-success { background: #16a34a; }
        .toast-warning { background: #d97706; }
        .toast-error { background: #dc2626; }

        /* 桌面增强 */
        @media (min-width: 900px) {
            .page {
                padding: 20px;
            }

            .grid-2 {
                grid-template-columns: 1fr 1fr;
            }

            .chat-layout {
                display: grid;
                grid-template-columns: 320px 1fr;
                align-items: start;
            }

            .chat-container {
                min-height: 70vh;
            }

            .chat-messages {
                max-height: 60vh;
            }

            .task-item {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }

            .modal {
                align-items: center;
                padding: 20px;
            }

            .modal-content {
                max-width: 960px;
                width: 100%;
                border-radius: 18px;
                max-height: 90vh;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar-title">AI Workflow Assistant</div>
            <div class="topbar-nav">
                <button class="nav-item active" data-page="chat">聊天</button>
                <button class="nav-item" data-page="batch">批处理</button>
                <button class="nav-item" data-page="tasks">任务</button>
                <button class="nav-item" data-page="cloud">云端文件</button>
                <button class="nav-item" data-page="settings">设置</button>
            </div>
        </header>

        <main class="page-wrap">
            <!-- 聊天页 -->
            <section id="page-chat" class="page active">
                <div class="chat-layout">
                    <div class="card">
                        <div class="card-title">
                            <span>会话列表</span>
                            <button id="btnNewConv" class="btn btn-primary btn-sm">新建</button>
                        </div>

                        <div class="form-group">
                            <label class="form-label">聊天配置</label>
                            <select id="chatConfigSelect" class="form-input">
                                <option value="">默认配置</option>
                            </select>
                        </div>

                        <div id="conversationList" class="conversation-list"></div>
                    </div>

                    <div class="card chat-container">
                        <div class="card-title">聊天窗口</div>
                        <div id="chatMessages" class="chat-messages"></div>

                        <div class="chat-input-area">
                            <textarea id="chatInput" class="form-input" placeholder="输入消息，回车发送，Shift+回车换行"></textarea>
                            <div class="btn-row">
                                <button id="btnSendMessage" class="btn btn-primary">发送</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 批处理页 -->
            <section id="page-batch" class="page">
                <div class="card">
                    <div class="card-title">上传 TXT 小说</div>
                    <div id="batchUploadArea" class="batch-upload-area">
                        <div style="font-size:28px;margin-bottom:8px;">📚</div>
                        <div style="font-size:15px;font-weight:700;margin-bottom:6px;">点击或拖拽上传 TXT 文件</div>
                        <div style="font-size:13px;color:var(--text-muted);">支持多本小说，前端只做章节预览，后端按原文重新解析执行</div>
                    </div>
                    <input id="batchFileInput" type="file" accept=".txt" multiple class="hidden" />
                </div>

                <div id="batchSettingsCard" class="card">
                    <div class="card-title">全局批处理设置</div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">默认每批章数</label>
                            <input id="globalBatchSize" class="form-input" type="number" min="1" max="100" value="10" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">批次间隔最小秒数</label>
                            <input id="globalDelayMin" class="form-input" type="number" min="0" max="3600" value="15" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">批次间隔最大秒数</label>
                            <input id="globalDelayMax" class="form-input" type="number" min="0" max="3600" value="45" />
                        </div>
                    </div>
                </div>

                <div id="batchFileList"></div>

                <div id="batchSubmitArea" class="card">
                    <div class="card-title">批处理操作</div>
                    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">
                        上传 TXT 后即可提交批处理
                    </div>
                    <div class="btn-row">
                        <button id="btnClearBatch" class="btn btn-secondary" disabled>清空列表</button>
                        <button id="btnSubmitBatch" class="btn btn-primary" disabled>提交批处理</button>
                    </div>
                </div>
            </section>
          <!-- 任务页 -->
            <section id="page-tasks" class="page">
                <div class="card">
                    <div class="card-title">
                        <span>任务列表</span>
                        <button id="btnRefreshTasks" class="btn btn-secondary btn-sm">刷新</button>
                    </div>
                    <div id="taskList"></div>
                </div>
            </section>

            <!-- 云端文件页 -->
            <section id="page-cloud" class="page">
                <div class="card">
                    <div class="card-title">
                        <span>云端文件设置</span>
                        <button id="btnRefreshCloudFiles" class="btn btn-secondary btn-sm">刷新文件</button>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">HF Token（可选，留空则用默认）</label>
                            <input id="cloudHfToken" class="form-input" type="password" placeholder="输入 Hugging Face Token" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">HF Dataset（可选，留空则用默认）</label>
                            <input id="cloudHfDataset" class="form-input" type="text" placeholder="用户名/数据集名" />
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">云端文件列表</div>
                    <div id="cloudFileList"></div>
                </div>
            </section>

            <!-- 设置页 -->
            <section id="page-settings" class="page">
                <div class="card">
                    <div class="card-title">服务器当前状态</div>
                    <div id="serverConfigStatus" style="font-size:13px;color:var(--text-secondary);line-height:1.8;">
                        加载中...
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">线程与并发设置</div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">最大并发书数</label>
                            <input id="maxConcurrent" class="form-input" type="number" min="1" max="100" value="10" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Worker 线程池大小</label>
                            <input id="threadPoolSize" class="form-input" type="number" min="1" max="100" value="10" />
                        </div>
                    </div>

                    <div class="btn-row" style="margin-top:10px;">
                        <button id="btnSaveThreadSettings" class="btn btn-primary">保存线程设置</button>
                    </div>

                    <div id="threadStatus" style="font-size:13px;color:var(--text-muted);margin-top:10px;">
                        -
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">批次延迟设置</div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">最小延迟（秒）</label>
                            <input id="batchDelayMin" class="form-input" type="number" min="0" max="3600" value="15" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">最大延迟（秒）</label>
                            <input id="batchDelayMax" class="form-input" type="number" min="0" max="3600" value="45" />
                        </div>
                    </div>

                    <div class="btn-row" style="margin-top:10px;">
                        <button id="btnSaveDelaySettings" class="btn btn-primary">保存延迟设置</button>
                    </div>

                    <div id="delayStatus" style="font-size:13px;color:var(--text-muted);margin-top:10px;">
                        -
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">默认执行配置</div>

                    <div class="form-group">
                        <label class="form-label">默认 API Host</label>
                        <input id="defApiHost" class="form-input" type="text" placeholder="例如：https://api.openai.com/v1" />
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">默认模型</label>
                            <input id="defModel" class="form-input" type="text" placeholder="例如：gpt-4o-mini / gpt-5.4" />
                        </div>

                        <div class="form-group">
                            <label class="form-label">temperature</label>
                            <input id="defTemperature" class="form-input" type="number" step="0.1" />
                        </div>

                        <div class="form-group">
                            <label class="form-label">top_p</label>
                            <input id="defTopP" class="form-input" type="number" step="0.05" />
                        </div>

                        <div class="form-group">
                            <label class="form-label">上下文轮数</label>
                            <input id="defContextRounds" class="form-input" type="number" min="0" />
                        </div>

                        <div class="form-group">
                            <label class="form-label">最大输出 tokens</label>
                            <input id="defMaxOutputTokens" class="form-input" type="number" min="1" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">默认聊天 System Prompt</label>
                        <textarea id="defSystemPrompt" class="form-input" placeholder="聊天功能默认 system prompt"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">默认批处理 System Prompt</label>
                        <textarea id="defBatchSystemPrompt" class="form-input" placeholder="批处理默认 system prompt"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">默认批处理 User Prompt Template</label>
                        <textarea id="defBatchUserPromptTemplate" class="form-input" placeholder="例如：请严格按照系统要求，提取下面章节的节奏链条：&#10;&#10;{content}"></textarea>
                    </div>

                    <div class="btn-row">
                        <button id="btnSaveDefaults" class="btn btn-primary">保存默认配置</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">
                        <span>自定义配置模板</span>
                        <button id="btnNewConfig" class="btn btn-primary btn-sm">新建配置</button>
                    </div>
                    <div id="configList"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- 任务详情弹窗 -->
    <div id="taskViewModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <div id="taskViewTitle" class="modal-title">任务详情</div>
                <button id="btnCloseTaskView" class="btn btn-secondary btn-sm">关闭</button>
            </div>
            <div id="taskViewBody" class="modal-body"></div>
            <div class="btn-row" style="margin-top:14px;">
                <button id="btnDownloadFromView" class="btn btn-success">下载当前任务</button>
                <button id="btnCloseTaskView2" class="btn btn-secondary">关闭</button>
            </div>
        </div>
    </div>

    <!-- 配置编辑弹窗 -->
    <div id="configModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <div id="configModalTitle" class="modal-title">新建配置</div>
                <button id="btnCloseConfigModal" class="btn btn-secondary btn-sm">关闭</button>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">配置名称</label>
                    <input id="cfgName" class="form-input" type="text" placeholder="例如：OpenRouter 节奏模板A" />
                </div>

                <div class="form-group">
                    <label class="form-label">聊天 System Prompt</label>
                    <textarea id="cfgSystemPrompt" class="form-input" placeholder="用于聊天功能"></textarea>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">聊天上下文轮数</label>
                        <input id="cfgContextRounds" class="form-input" type="number" min="0" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">最大输出 tokens</label>
                        <input id="cfgMaxOutputTokens" class="form-input" type="number" min="1" />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">批处理 System Prompt</label>
                    <textarea id="cfgBatchSystemPrompt" class="form-input" placeholder="用于小说批处理"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">批处理 User Prompt Template</label>
                    <textarea id="cfgBatchUserPromptTemplate" class="form-input" placeholder="必须包含 {content} 占位符"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">默认批次大小</label>
                    <input id="cfgBatchSize" class="form-input" type="number" min="1" max="100" />
                </div>

                <div class="form-group">
                    <label class="form-label">API Host</label>
                    <input id="cfgApiHost" class="form-input" type="text" placeholder="例如：https://api.openai.com/v1" />
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">API Key（留空则不更新）</label>
                        <input id="cfgApiKey" class="form-input" type="password" placeholder="输入后会保存到该配置" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">模型</label>
                        <input id="cfgModel" class="form-input" type="text" placeholder="例如：gpt-4o-mini / gpt-5.4" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">temperature</label>
                        <input id="cfgTemperature" class="form-input" type="number" step="0.1" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">top_p</label>
                        <input id="cfgTopP" class="form-input" type="number" step="0.05" />
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">HF Token（留空则不更新）</label>
                        <input id="cfgHfToken" class="form-input" type="password" placeholder="可选" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">HF Dataset</label>
                        <input id="cfgHfDataset" class="form-input" type="text" placeholder="用户名/数据集名" />
                    </div>
                </div>
            </div>

            <div class="btn-row" style="margin-top:14px;">
                <button id="btnDeleteConfig" class="btn btn-danger">删除配置</button>
                <button id="btnCancelConfig" class="btn btn-secondary">取消</button>
                <button id="btnSaveConfig" class="btn btn-primary">保存配置</button>
            </div>
        </div>
    </div>

    <!-- 全局 Loading -->
    <div id="globalLoading" class="global-loading hidden">
        <div class="global-loading-box">
            <div style="font-size:24px;margin-bottom:8px;">⏳</div>
            <div id="globalLoadingText">处理中...</div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
